apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeimpact
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeimpact
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["list"]
  - apiGroups: ["storagemigration.k8s.io"]
    resources: ["storageversionmigrations"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeimpact
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubeimpact
subjects:
  - kind: ServiceAccount
    name: kubeimpact
    namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeimpact
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubeimpact
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubeimpact
    spec:
      serviceAccountName: kubeimpact
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kubeimpact
          image: ghcr.io/your-org/kubeimpact:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: kubeimpact
  namespace: kube-system
spec:
  selector:
    app.kubernetes.io/name: kubeimpact
  ports:
    - name: http
      port: 80
      targetPort: http
